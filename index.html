<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypoAnim - Typography Video Generator</title>
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
            .preview-container { order: -1; }
        }

        /* Controls Section */
        .controls {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h1 { margin-bottom: 20px; font-size: 24px; color: var(--primary); }

        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; }

        textarea {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            resize: none;
            margin-bottom: 20px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .btn-group { display: flex; gap: 10px; }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-generate { background: var(--primary); color: white; }
        .btn-generate:hover { background: var(--primary-hover); }
        .btn-download { background: #10b981; color: white; display: none; }

        /* Preview Section */
        .preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 9 / 16;
            max-height: 70vh;
            border: 4px solid #334155;
        }

        canvas {
            height: 100%;
            width: auto;
            max-width: 100%;
        }

        .status-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <h1>✨ TypoAnim Reel Generator</h1>

    <div class="container">
        <!-- Input Side -->
        <div class="controls">
            <label>Video Script (Each line is a new slide)</label>
            <textarea id="scriptInput" placeholder="Enter your script here...&#10;Line 1: Hello World&#10;Line 2: Create Typography Videos&#10;Line 3: Fast and Easy!">Stop Dreaming.
Start Creating.
Generate Videos
Instantly.</textarea>

            <label>Animation Style</label>
            <select id="animStyle">
                <option value="fade">Smooth Fade</option>
                <option value="slide">Slide Up</option>
                <option value="zoom">Dynamic Zoom</option>
            </select>

            <label>Background Color</label>
            <input type="color" id="bgColor" value="#000000">

            <label>Text Color</label>
            <input type="color" id="textColor" value="#ffffff">

            <div class="btn-group">
                <button class="btn-generate" onclick="startGeneration()">Generate & Preview</button>
                <button id="downloadBtn" class="btn-download" onclick="downloadVideo()">Download MP4</button>
            </div>
        </div>

        <!-- Preview Side -->
        <div class="preview-container">
            <canvas id="videoCanvas" width="1080" height="1920"></canvas>
            <div id="status" class="status-overlay">Recording...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('videoCanvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusOverlay = document.getElementById('status');
        
        let mediaRecorder;
        let recordedChunks = [];
        let animationId;

        // Settings
        const FPS = 30;
        const SLIDE_DURATION = 2000; // 2 seconds per line

        function startGeneration() {
            const lines = document.getElementById('scriptInput').value.split('\n').filter(l => l.trim() !== '');
            if (lines.length === 0) return alert("Please enter some text.");

            recordedChunks = [];
            downloadBtn.style.display = 'none';
            
            // Setup recording
            const stream = canvas.captureStream(FPS);
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp9',
                videoBitsPerSecond: 5000000 // 5Mbps for high quality
            });

            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                downloadBtn.style.display = 'block';
                statusOverlay.style.display = 'none';
            };

            mediaRecorder.start();
            statusOverlay.style.display = 'block';
            
            animate(lines);
        }

        function animate(lines) {
            let startTime = null;
            const totalDuration = lines.length * SLIDE_DURATION;
            const style = document.getElementById('animStyle').value;
            const bgColor = document.getElementById('bgColor').value;
            const textColor = document.getElementById('textColor').value;

            function draw(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                
                if (elapsed >= totalDuration) {
                    cancelAnimationFrame(animationId);
                    mediaRecorder.stop();
                    return;
                }

                const currentLineIndex = Math.floor(elapsed / SLIDE_DURATION);
                const lineProgress = (elapsed % SLIDE_DURATION) / SLIDE_DURATION;
                const text = lines[currentLineIndex];

                // Clear Canvas
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Text Settings
                ctx.fillStyle = textColor;
                ctx.font = "bold 80px Inter";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";

                // Animation Logic
                ctx.save();
                let alpha = 1;
                let yOffset = 0;
                let scale = 1;

                if (style === 'fade') {
                    // Simple fade in and out
                    if (lineProgress < 0.2) alpha = lineProgress * 5;
                    if (lineProgress > 0.8) alpha = (1 - lineProgress) * 5;
                    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                } 
                else if (style === 'slide') {
                    // Slide from bottom
                    if (lineProgress < 0.2) yOffset = 100 * (1 - (lineProgress * 5));
                    if (lineProgress > 0.8) yOffset = -100 * (lineProgress - 0.8) * 5;
                    ctx.translate(0, yOffset);
                }
                else if (style === 'zoom') {
                    // Constant subtle zoom
                    scale = 1 + (lineProgress * 0.2);
                    if (lineProgress < 0.2) alpha = lineProgress * 5;
                    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                    ctx.translate(canvas.width/2, canvas.height/2);
                    ctx.scale(scale, scale);
                    ctx.translate(-canvas.width/2, -canvas.height/2);
                }

                // Render Text (Handle multi-word wrapping if needed, here simplified)
                ctx.fillText(text.toUpperCase(), canvas.width / 2, canvas.height / 2);
                ctx.restore();

                animationId = requestAnimationFrame(draw);
            }

            animationId = requestAnimationFrame(draw);
        }

        function downloadVideo() {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'typography-video.webm';
            a.click();
        }
    </script>
</body>
</html>
